<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Predictor</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
<h1 class="baloo-bhai-2-bold">Customer Churn Predictor</h1>
<div class="container">
    <div class="grid">
        <div>
            <label>Gender</label>
            <select id="gender">
                <option value="0">Female</option>
                <option value="1">Male</option>
            </select>
        </div>

        <div>
            <label>Senior Citizen</label>
            <select id="SeniorCitizen">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div>
            <label>Partner</label>
            <select id="Partner">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div>
            <label>Dependents</label>
            <select id="Dependents">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div>
            <label>Tenure (months)</label>
            <input type="number" id="tenure" placeholder="e.g. 12" min="0" max="72" />
        </div>

        <div>
            <label>Monthly Charges ($)</label>
            <input type="number" id="MonthlyCharges" placeholder="e.g. 65.5" step="0.01" />
        </div>

        <div>
            <label>Phone Service</label>
            <select id="PhoneService">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div>
            <label>Multiple Lines</label>
            <select id="MultipleLines">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Phone Service</option>
            </select>
        </div>

        <div>
            <label>Internet Service</label>
            <select id="InternetService">
                <option value="0">DSL</option>
                <option value="1">Fiber Optic</option>
                <option value="2">No</option>
            </select>
        </div>

        <div>
            <label>Online Security</label>
            <select id="OnlineSecurity">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Internet</option>
            </select>
        </div>

        <div>
            <label>Online Backup</label>
            <select id="OnlineBackup">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Internet</option>
            </select>
        </div>

        <div>
            <label>Device Protection</label>
            <select id="DeviceProtection">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Internet</option>
            </select>
        </div>

        <div>
            <label>Tech Support</label>
            <select id="TechSupport">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Internet</option>
            </select>
        </div>

        <div>
            <label>Streaming TV</label>
            <select id="StreamingTV">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Internet</option>
            </select>
        </div>

        <div>
            <label>Streaming Movies</label>
            <select id="StreamingMovies">
                <option value="0">No</option>
                <option value="1">Yes</option>
                <option value="2">No Internet</option>
            </select>
        </div>

        <div>
            <label>Contract</label>
            <select id="Contract">
                <option value="0">Month-to-Month</option>
                <option value="1">One Year</option>
                <option value="2">Two Year</option>
            </select>
        </div>

        <div>
            <label>Paperless Billing</label>
            <select id="PaperlessBilling">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div>
            <label>Payment Method</label>
            <select id="PaymentMethod">
                <option value="0">Bank Transfer</option>
                <option value="1">Credit Card</option>
                <option value="2">Electronic Check</option>
                <option value="3">Mailed Check</option>
            </select>
        </div>

    </div>

    <button onclick="predict()">Predict Churn</button>

    <div id="result">
        <h3 id="churn-label"></h3>
        <p id="prob-label"></p>
        <h4 style="margin-top:10px">Why?</h4>
        <ul id="insights-list"></ul>
    </div>
</div>

<script>
async function predict() {
    const fields = ['gender','SeniorCitizen','Partner','Dependents','tenure',
                    'MonthlyCharges','PhoneService','MultipleLines','InternetService',
                    'OnlineSecurity','OnlineBackup','DeviceProtection','TechSupport',
                    'StreamingTV','StreamingMovies','Contract','PaperlessBilling','PaymentMethod'];

    const formData = new FormData();
    for (let f of fields) {
        const val = document.getElementById(f).value;
        if (!val && val !== "0") {
            alert("Please fill in all fields!");
            return;
        }
        formData.append(f, val);
    }

    const res = await fetch("/predict", { method: "POST", body: formData });
    const result = await res.json();

    if (result.error) {
        alert("Error: " + result.error);
        return;
    }

    const box = document.getElementById("result");
    box.style.display = "block";
    box.className = result.churn.includes("Yes") ? "churn-yes" : "churn-no";

    document.getElementById("churn-label").innerText = "Churn Prediction: " + result.churn;
    document.getElementById("prob-label").innerText = "Churn Probability: " + result.probability + "%";

    const ul = document.getElementById("insights-list");
    ul.innerHTML = result.insights.map(i => `<li>${i}</li>`).join("");
}
</script>
</body>
</html>
